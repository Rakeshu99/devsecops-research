name: Open-Source Security Stack Pipeline
on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/opensource-stack.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/opensource-stack.yml'
  workflow_dispatch:
jobs:
  semgrep:
    name: Semgrep — Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Semgrep
        run: pip3 install semgrep
      - name: Run Semgrep OWASP Top Ten scan
        run: semgrep --config=p/owasp-top-ten --no-git-ignore --json --output=semgrep-results.json . || true
      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
  trivy:
    name: Trivy — Container and Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
      - name: Run Trivy image scan
        run: trivy image webgoat/webgoat --severity CRITICAL,HIGH --timeout 15m --format json --output trivy-results.json || true
      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
  trufflehog:
    name: Trufflehog — Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Run Trufflehog secret scan
        run: trufflehog filesystem . --no-update --json > trufflehog-results.json || true
      - name: Upload Trufflehog results
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: trufflehog-results.json
  opa:
    name: OPA — Policy Enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/
      - name: Install pyyaml for YAML conversion
        run: pip3 install pyyaml
      - name: Convert WebGoat release.yml to JSON
        run: |
          python3 -c "import yaml, json; print(json.dumps(yaml.safe_load(open('app/webgoat/.github/workflows/release.yml'))))" > release-workflow.json
      - name: Convert WebGoat build.yml to JSON
        run: |
          python3 -c "import yaml, json; print(json.dumps(yaml.safe_load(open('app/webgoat/.github/workflows/build.yml'))))" > build-workflow.json
      - name: Copy OPA policies from stacks folder
        run: |
          cp stacks/opensource/opa/github-actions-security.rego .
          cp stacks/opensource/opa/action-pinning.rego .
          cp stacks/opensource/opa/secret-logging.rego .
      - name: "Run Policy 1 — Shell injection (target: WebGoat release.yml)"
        run: |
          opa eval --data github-actions-security.rego --input release-workflow.json "data.githubactions.deny" --format pretty > opa-results-policy1.json || true
          cat opa-results-policy1.json
      - name: "Run Policy 2 — Unpinned actions (target: WebGoat release.yml + build.yml)"
        run: |
          opa eval --data action-pinning.rego --input release-workflow.json "data.actionpinning.deny" --format pretty > opa-results-policy2-release.json || true
          opa eval --data action-pinning.rego --input build-workflow.json "data.actionpinning.deny" --format pretty > opa-results-policy2-build.json || true
          cat opa-results-policy2-release.json
          cat opa-results-policy2-build.json
      - name: "Run Policy 3 — Secret logging (target: WebGoat release.yml)"
        run: |
          opa eval --data secret-logging.rego --input release-workflow.json "data.secretlogging.deny" --format pretty > opa-results-policy3.json || true
          cat opa-results-policy3.json
      - name: Upload OPA results
        uses: actions/upload-artifact@v4
        with:
          name: opa-results
          path: opa-results-policy*.json